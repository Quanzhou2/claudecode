{% extends "base.html" %}
{% block title %}Sign in · {{ app_name }}{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>🧾 Sign in</h1>
  <p class="muted">{{ app_name }}</p>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <label>Username
      <input name="username" value="{{ username or '' }}" autofocus required>
    </label>
    <label>Password
      <input name="password" type="password" required>
    </label>
    <button class="btn btn-primary" type="submit">Sign in</button>
  </form>
  <p class="muted">No account? <a href="/register">Register</a></p>
</div>
{% endblock %}
