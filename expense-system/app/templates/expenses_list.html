{% extends "base.html" %}
{% block title %}报销记录 · {{ app_name }}{% endblock %}
{% block content %}
<div class="page-head">
  <h1>报销记录</h1>
  <div class="actions">
    <a class="btn" href="/expenses/export.csv?status={{ filters.status }}&category={{ filters.category }}&q={{ filters.q }}">⬇ 导出 CSV</a>
    <a class="btn btn-primary" href="/expenses/new">+ 新建报销</a>
  </div>
</div>

<form class="filters card" method="get" action="/expenses">
  <input name="q" placeholder="搜索 商户 / 发票号 / 备注" value="{{ filters.q }}">
  <select name="status">
    <option value="">全部状态</option>
    {% for s in statuses %}
      <option value="{{ s }}" {{ 'selected' if filters.status == s }}>{{ s | status_label }}</option>
    {% endfor %}
  </select>
  <select name="category">
    <option value="">全部分类</option>
    {% for c in categories %}
      <option value="{{ c }}" {{ 'selected' if filters.category == c }}>{{ c }}</option>
    {% endfor %}
  </select>
  <input name="date_from" type="date" value="{{ filters.date_from }}" title="起始日期">
  <input name="date_to" type="date" value="{{ filters.date_to }}" title="结束日期">
  <button class="btn" type="submit">筛选</button>
  <a class="btn-link" href="/expenses">重置</a>
</form>

<div class="card">
  <p class="muted">共 {{ total }} 条记录</p>
  {% include "_expense_table.html" %}

  {% if pages > 1 %}
  <div class="pagination">
    {% for p in range(1, pages + 1) %}
      <a class="page {{ 'active' if p == page }}"
         href="/expenses?page={{ p }}&status={{ filters.status }}&category={{ filters.category }}&q={{ filters.q }}&date_from={{ filters.date_from }}&date_to={{ filters.date_to }}">{{ p }}</a>
    {% endfor %}
  </div>
  {% endif %}
</div>
{% endblock %}
