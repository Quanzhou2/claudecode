{% extends "base.html" %}
{% block title %}新建报销 · {{ app_name }}{% endblock %}
{% block content %}
<div class="page-head"><h1>新建报销</h1></div>

<div class="card">
  <p class="muted">
    上传发票图片。{% if llm_enabled %}系统会自动识别并预填字段，供你核对。
    {% else %}（离线模式：下一步请手动录入字段。）{% endif %}
  </p>
  <form method="post" action="/expenses/extract" enctype="multipart/form-data">
    <label class="dropzone" id="dropzone">
      <input type="file" name="file" id="fileInput" accept="image/*" required hidden>
      <div id="dropText">📷 点击选择发票图片（JPG/PNG/WEBP/GIF）</div>
      <img id="preview" alt="预览" hidden>
    </label>
    <button class="btn btn-primary" type="submit" id="submitBtn">识别发票 →</button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
  const input = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const dropText = document.getElementById('dropText');
  input.addEventListener('change', () => {
    const f = input.files[0];
    if (!f) return;
    preview.src = URL.createObjectURL(f);
    preview.hidden = false;
    dropText.textContent = f.name;
  });
  document.querySelector('form').addEventListener('submit', () => {
    document.getElementById('submitBtn').textContent = '识别中…';
    document.getElementById('submitBtn').disabled = true;
  });
</script>
{% endblock %}
