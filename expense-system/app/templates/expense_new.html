{% extends "base.html" %}
{% block title %}新建报销 · {{ app_name }}{% endblock %}
{% block content %}
<div class="page-head">
  <h1>新建报销</h1>
  <a class="btn-link" href="/expenses/manual">或手动录入 →</a>
</div>

<p class="muted">
  支持<strong>发票 / 收据</strong>，以及<strong>微信支付、支付宝、拼多多、京东、淘宝</strong>等
  支付与订单截图。可上传图片，或直接粘贴订单 / 账单文字。
</p>

<div class="grid-2">
  <div class="card">
    <h2>📷 上传图片</h2>
    <form method="post" action="/expenses/extract" enctype="multipart/form-data">
      <div class="seg" role="radiogroup">
        <label><input type="radio" name="ticket_type" value="einvoice" checked>
          <span>电子发票</span><small>提取字段，按发票号码查重</small></label>
        <label><input type="radio" name="ticket_type" value="payment">
          <span>支付凭证</span><small>保存图片，按图片相似度查重</small></label>
      </div>
      <label class="dropzone" id="dropzone">
        <input type="file" name="files" id="fileInput" accept="image/*" multiple required hidden>
        <div id="dropText">点击选择凭证图片，可一次选择多张（JPG / PNG / WEBP / GIF）</div>
        <div id="previews" class="previews"></div>
      </label>
      <button class="btn btn-primary" type="submit" id="submitBtn">识别图片 →</button>
    </form>
  </div>

  <div class="card">
    <h2>📝 粘贴文字</h2>
    <form method="post" action="/expenses/extract-text">
      <label>粘贴订单 / 账单文字，自动识别字段
        <textarea name="text" rows="9" required
                  placeholder="例如：&#10;订单编号 2305323517530017374&#10;微信交易号 431740224720240925...&#10;实付款 ¥88&#10;付款时间 2024-09-25 16:02:54&#10;商品 欧莱雅玻色因B5安瓶面膜"></textarea>
      </label>
      <button class="btn btn-primary" type="submit">识别文字 →</button>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  const input = document.getElementById('fileInput');
  const previews = document.getElementById('previews');
  const dropText = document.getElementById('dropText');
  input.addEventListener('change', () => {
    previews.innerHTML = '';
    const files = Array.from(input.files);
    if (!files.length) return;
    dropText.textContent = files.length === 1 ? files[0].name : ('已选择 ' + files.length + ' 张图片');
    files.slice(0, 12).forEach(f => {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      previews.appendChild(img);
    });
  });
  input.closest('form').addEventListener('submit', () => {
    const b = document.getElementById('submitBtn');
    b.textContent = '识别中…';
    b.disabled = true;
  });
</script>
{% endblock %}
