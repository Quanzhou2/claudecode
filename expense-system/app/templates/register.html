{% extends "base.html" %}
{% block title %}注册 · {{ app_name }}{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>创建账号</h1>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" action="/register">
    <label>用户名 <input name="username" value="{{ username or '' }}" required></label>
    <label>姓名 <input name="full_name" value="{{ full_name or '' }}"></label>
    <label>邮箱 <input name="email" type="email" value="{{ email or '' }}"></label>
    <label>密码 <input name="password" type="password" required></label>
    <button class="btn btn-primary" type="submit">注册</button>
  </form>
  <p class="muted">已有账号？<a href="/login">返回登录</a></p>
</div>
{% endblock %}
