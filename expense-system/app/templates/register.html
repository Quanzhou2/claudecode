{% extends "base.html" %}
{% block title %}Register · {{ app_name }}{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Create account</h1>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" action="/register">
    <label>Username <input name="username" value="{{ username or '' }}" required></label>
    <label>Full name <input name="full_name" value="{{ full_name or '' }}"></label>
    <label>Email <input name="email" type="email" value="{{ email or '' }}"></label>
    <label>Password <input name="password" type="password" required></label>
    <button class="btn btn-primary" type="submit">Register</button>
  </form>
  <p class="muted">Already have an account? <a href="/login">Sign in</a></p>
</div>
{% endblock %}
